<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7DD3C0"/>
      <stop offset="100%" stop-color="#87CEEB"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- 로고: 원 + 하트 (중앙 정렬) -->
  <g transform="translate(600, 205)">
    <circle cx="0" cy="0" r="92" fill="#ffffff" fill-opacity="0.22"/>
    <g transform="scale(2.875)">
      <path d="M0 13
               C-1 10 -13 2.5 -13 -5
               C-13 -9.2 -9.8 -12 -6 -12
               C-3.3 -12 -1 -10.3 0 -8
               C1 -10.3 3.3 -12 6 -12
               C9.8 -12 13 -9.2 13 -5
               C13 2.5 1 10 0 13 Z"
            fill="none" stroke="#ffffff" stroke-width="4.2" stroke-linejoin="round" stroke-linecap="round"/>
    </g>
  </g>

  <!-- 타이틀 -->
  <text x="600" y="420" text-anchor="middle"
        font-family="'Apple SD Gothic Neo','AppleGothic','Noto Sans CJK KR','Malgun Gothic',sans-serif"
        font-size="130" font-weight="800" fill="#ffffff">손길</text>

  <!-- 서브타이틀 -->
  <text x="600" y="500" text-anchor="middle"
        font-family="'Apple SD Gothic Neo','AppleGothic','Noto Sans CJK KR','Malgun Gothic',sans-serif"
        font-size="44" font-weight="500" fill="#ffffff" fill-opacity="0.92">당신의 건강을 위한 작은 손길</text>
</svg>
